<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>敦煌医学专业康养顾问 - 独立智能对话</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        /* ----- 虚化背景图片（与首页保持一致）----- */
        body {
            position: relative;
            background-color: #2a160a;
        }
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('image.jpg');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            filter: blur(12px);
            transform: scale(1.05);
            z-index: -2;
            pointer-events: none;
            will-change: transform;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.25);
            z-index: -1;
            pointer-events: none;
        }

        html, body, #app {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        #app {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            z-index: 1;
            background-color: transparent;
        }
        .message-container {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
            -webkit-overflow-scrolling: touch;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: rgba(241, 241, 241, 0.5); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(193, 193, 193, 0.8); border-radius: 10px; }
        .typing-indicator span {
            display: inline-block; width: 6px; height: 6px; border-radius: 50%;
            background-color: #9ca3af; margin: 0 2px;
            animation: typing 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }
        .voice-btn:hover { background-color: #e5e7eb; transform: scale(1.05); }
        .voice-stop-btn:hover { background-color: #fee2e2; transform: scale(1.05); }
        .break-words {
            word-break: break-word;
            white-space: normal;
        }
        .nav-btn {
            transition: all 0.2s ease;
            min-width: 36px;
            min-height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav-btn:active {
            transform: scale(0.95);
        }
        
        /* ========= 响应式样式：兼容手机、平板、桌面 ========= */
        /* 基础消息气泡最大宽度 */
        .message-container .flex {
            max-width: 100%;
        }
        /* 助手和用户消息气泡宽度自适应 */
        .message-container .flex .max-w-\[90\%\] {
            max-width: 85%;
        }
        @media (min-width: 640px) {
            .message-container .flex .max-w-\[90\%\] {
                max-width: 80%;
            }
        }
        @media (min-width: 1024px) {
            .message-container .flex .max-w-\[90\%\] {
                max-width: 70%;
            }
        }
        /* 手机横屏或小屏手机 (<=480px) */
        @media (max-width: 480px) {
            .message-container .flex .max-w-\[90\%\] {
                max-width: 92%;
            }
            .message-container .px-4 {
                padding-left: 12px;
                padding-right: 12px;
            }
            header .max-w-5xl {
                padding-left: 12px;
                padding-right: 12px;
            }
            .border-t .max-w-3xl {
                padding-left: 8px;
                padding-right: 8px;
            }
            .nav-btn {
                width: 36px;
                height: 36px;
            }
            h1.text-xl {
                font-size: 1.2rem;
            }
            .hero-text {
                font-size: 0.9rem;
            }
            .voice-btn, .voice-stop-btn {
                width: 32px;
                height: 32px;
            }
        }
        /* 超小屏 (<=380px) 进一步紧凑 */
        @media (max-width: 380px) {
            header .flex.items-center {
                gap: 0.5rem;
            }
            .nav-btn {
                width: 32px;
                height: 32px;
            }
            .voice-btn {
                width: 28px;
                height: 28px;
            }
        }
        /* 平板竖屏 */
        @media (min-width: 768px) and (max-width: 1023px) {
            .message-container .flex .max-w-\[90\%\] {
                max-width: 75%;
            }
        }
        /* 横屏模式优化 */
        @media (orientation: landscape) and (max-height: 500px) {
            header {
                padding-top: 4px;
                padding-bottom: 4px;
            }
            .message-container {
                padding-bottom: 8px;
            }
            .border-t {
                padding: 8px;
            }
            .typing-indicator {
                margin-top: 0;
            }
        }
        /* 调整卡片背景透明度保持可读 */
        header {
            background-color: rgba(255, 255, 255, 0.85) !important;
            backdrop-filter: blur(4px);
        }
        .message-container .bg-white {
            background-color: rgba(255, 255, 255, 0.92) !important;
        }
        .message-container .bg-indigo-600 {
            background-color: rgba(79, 70, 229, 0.92) !important;
        }
        .border-t {
            background-color: rgba(255, 255, 255, 0.85) !important;
            backdrop-filter: blur(4px);
        }
        .bg-gray-50 {
            background-color: rgba(249, 250, 251, 0.9) !important;
        }
        .fixed.inset-0.bg-black\/30 {
            background-color: rgba(0, 0, 0, 0.5);
        }
        .fixed.inset-0.bg-black\/30 > div {
            background-color: white !important;
        }
        .typing-indicator span {
            background-color: #6b7280;
        }
        /* 输入框textarea自动适应高度 */
        textarea {
            font-size: 16px; /* 避免iOS缩放 */
        }
    </style>
</head>
<body class="font-sans">
    <div id="app" class="h-full flex flex-col overflow-hidden">
        <!-- 顶部导航栏 -->
        <header class="bg-white/80 backdrop-blur-sm border-b shadow-sm flex-shrink-0">
            <div class="max-w-5xl mx-auto px-4 py-2 sm:py-3 flex items-center justify-between">
                <div class="flex items-center space-x-2 sm:space-x-3">
                    <div class="w-7 h-7 sm:w-8 sm:h-8 bg-indigo-600 rounded-xl flex items-center justify-center shadow-md">
                        <i class="fas fa-robot text-white text-xs sm:text-sm"></i>
                    </div>
                    <h1 class="text-base sm:text-xl font-semibold bg-gradient-to-r from-indigo-700 to-purple-700 bg-clip-text text-transparent">专业康养顾问</h1>
                </div>
                <div class="flex items-center gap-1 sm:gap-2">
                    <button @click="stopSpeaking" class="nav-btn p-1.5 sm:p-2 rounded-full hover:bg-red-50 transition" title="停止语音播报">
                        <i class="fas fa-stop-circle text-red-500 text-base sm:text-lg"></i>
                    </button>
                    <button @click="newConversation" :disabled="isStreaming" class="nav-btn p-1.5 sm:p-2 rounded-full hover:bg-gray-100 disabled:opacity-50" title="新建对话">
                        <i class="fas fa-plus text-gray-600 text-base sm:text-lg"></i>
                    </button>
                    <button @click="showConfig = !showConfig" class="nav-btn p-1.5 sm:p-2 rounded-full hover:bg-gray-100" title="API配置">
                        <i class="fas fa-sliders-h text-gray-600 text-base sm:text-lg"></i>
                    </button>
                    <button @click="goBackToHome" class="nav-btn p-1.5 sm:p-2 rounded-full hover:bg-indigo-100 transition" title="返回主页">
                        <i class="fas fa-home text-indigo-600 text-base sm:text-lg"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- 配置侧边栏 -->
        <div v-if="showConfig" class="fixed inset-0 bg-black/30 z-20 flex justify-end" @click.self="showConfig=false">
            <div class="w-full max-w-md bg-white h-full shadow-2xl p-6 overflow-y-auto">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold">⚙️ API 配置</h2>
                    <button @click="showConfig=false" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
                </div>
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium">API 基础地址</label>
                        <input type="text" v-model="userConfig.apiBase" placeholder="https://api.dify.ai/v1" class="w-full border rounded-lg px-4 py-2">
                    </div>
                    <div>
                        <label class="block text-sm font-medium">API Key</label>
                        <input type="password" v-model="userConfig.apiKey" placeholder="app-xxx" class="w-full border rounded-lg px-4 py-2">
                    </div>
                    <button @click="saveUserConfig" class="w-full bg-indigo-600 text-white py-2 rounded-lg">保存配置</button>
                </div>
            </div>
        </div>

        <!-- 消息区域 -->
        <main class="message-container" ref="messageContainer">
            <div class="max-w-5xl mx-auto px-3 sm:px-4 py-4 sm:py-6 space-y-4 sm:space-y-5">
                <div v-if="messages.length===0" class="flex flex-col items-center justify-center h-48 sm:h-64 text-gray-500">
                    <i class="fas fa-comment-dots text-4xl sm:text-5xl mb-3 opacity-60"></i>
                    <p class="text-base sm:text-lg font-medium">开始与康养顾问对话</p>
                    <p class="text-xs sm:text-sm mt-1 text-center px-4">默认 API 已配置，可直接使用 | 语音可随时停止</p>
                </div>
                <div v-for="(msg, idx) in messages" :key="msg.id" class="flex" :class="msg.role==='user'?'justify-end':'justify-start'">
                    <div v-if="msg.role==='assistant'" class="flex items-start gap-1.5 sm:gap-2 max-w-[85%] sm:max-w-[80%] lg:max-w-[70%]">
                        <div class="flex-shrink-0 w-7 h-7 sm:w-8 sm:h-8 rounded-full bg-gray-200 flex items-center justify-center"><i class="fas fa-robot text-gray-600 text-xs sm:text-sm"></i></div>
                        <div class="relative px-3 py-2 sm:px-4 sm:py-3 rounded-2xl bg-white text-gray-800 border border-gray-100 flex-1 break-words shadow-sm text-sm sm:text-base">
                            <div class="prose prose-sm max-w-none" v-html="renderMarkdown(msg.content)"></div>
                            <div v-if="idx===messages.length-1 && isStreaming && !msg.content" class="typing-indicator flex space-x-1 py-1 mt-1">
                                <span></span><span></span><span></span>
                            </div>
                        </div>
                        <button @click="speakMessage(msg)" :disabled="shouldDisableVoice(msg,idx)" class="voice-btn flex-shrink-0 w-7 h-7 sm:w-8 sm:h-8 rounded-full bg-gray-100 text-gray-600 flex items-center justify-center">
                            <i class="fas fa-volume-up text-xs sm:text-sm"></i>
                        </button>
                    </div>
                    <div v-else class="flex items-start gap-1.5 sm:gap-2 max-w-[85%] sm:max-w-[80%] lg:max-w-[70%] flex-row-reverse">
                        <div class="flex-shrink-0 w-7 h-7 sm:w-8 sm:h-8 rounded-full bg-indigo-100 flex items-center justify-center"><i class="fas fa-user text-indigo-600 text-xs sm:text-sm"></i></div>
                        <div class="relative px-3 py-2 sm:px-4 sm:py-3 rounded-2xl bg-indigo-600 text-white rounded-tr-none break-words shadow-sm text-sm sm:text-base">
                            <div class="whitespace-pre-wrap">{{ msg.content }}</div>
                        </div>
                        <button @click="speakMessage(msg)" class="voice-btn flex-shrink-0 w-7 h-7 sm:w-8 sm:h-8 rounded-full bg-gray-100 text-gray-600 flex items-center justify-center">
                            <i class="fas fa-volume-up text-xs sm:text-sm"></i>
                        </button>
                    </div>
                </div>
                <div v-if="errorMsg" class="bg-red-50 border border-red-200 text-red-700 px-4 py-2 rounded-xl text-sm">{{ errorMsg }}</div>
            </div>
        </main>

        <!-- 底部输入 -->
        <div class="border-t bg-white/90 p-2 sm:p-4 shadow-lg flex-shrink-0">
            <div class="max-w-3xl mx-auto">
                <div class="flex items-end gap-2 sm:gap-3 bg-gray-50 rounded-2xl border p-1.5 sm:p-2 focus-within:ring-2 focus-within:ring-indigo-300">
                    <textarea v-model="inputMessage" @keydown.enter.exact="sendMessage" @keydown.enter.shift.exact="inputMessage+='\n'" rows="1"
                        :disabled="isStreaming || !isApiReady" placeholder="输入消息... (Enter发送, Shift+Enter换行)" 
                        class="flex-1 bg-transparent border-0 resize-none outline-none py-2 px-2 sm:px-3 max-h-32 text-gray-700 placeholder-gray-400 text-sm sm:text-base"
                        style="min-height: 40px;"></textarea>
                    <button v-if="!isStreaming" @click="sendMessage" :disabled="!inputMessage.trim() || !isApiReady"
                        class="p-2 rounded-full transition disabled:opacity-40 disabled:cursor-not-allowed"
                        :class="inputMessage.trim()&&isApiReady?'bg-indigo-600 text-white hover:bg-indigo-700 shadow':'bg-gray-200 text-gray-400'">
                        <i class="fas fa-paper-plane text-sm sm:text-base"></i>
                    </button>
                    <button v-else @click="stopStreaming" class="p-2 rounded-full bg-red-100 text-red-600 hover:bg-red-200">
                        <i class="fas fa-stop text-sm sm:text-base"></i>
                    </button>
                </div>
                <div class="flex justify-between mt-2 text-xs text-gray-500 px-1">
                    <span><i class="fas fa-database"></i> {{ isApiReady ? '✅ API已就绪' : '⚠️ 请配置API Key' }}</span>
                    <span><i class="fas fa-home"></i> 主页按钮 | 独立设备数据</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted, nextTick, watch } = Vue;

        const DEFAULT_API_BASE = 'https://api.dify.ai/v1';
        const DEFAULT_API_KEY = 'app-66HmEsxZuCXDJGjKPQ6D8zN4';

        function getOrCreateDeviceId() {
            let deviceId = localStorage.getItem('dify_device_id');
            if (!deviceId) {
                deviceId = 'dev_' + Date.now() + '_' + Math.random().toString(36).substring(2, 10);
                localStorage.setItem('dify_device_id', deviceId);
            }
            return deviceId;
        }

        function getOrCreateUserId(deviceId) {
            let userId = localStorage.getItem('dify_user_id');
            if (!userId) {
                userId = `user_${deviceId}`;
                localStorage.setItem('dify_user_id', userId);
            }
            return userId;
        }

        function markdownToPlainText(md) {
            if (!md) return '';
            let text = md.replace(/!\[.*?\]\(.*?\)/g, '')
                         .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
                         .replace(/`([^`]+)`/g, '$1')
                         .replace(/```[\s\S]*?```/g, '')
                         .replace(/(\*\*|__)(.*?)\1/g, '$2')
                         .replace(/(\*|_)(.*?)\1/g, '$2')
                         .replace(/^#{1,6}\s+/gm, '')
                         .replace(/^[\s]*[-+*]\s+/gm, '')
                         .replace(/^\d+\.\s+/gm, '')
                         .replace(/<[^>]*>/g, '');
            return text.trim();
        }

        async function* parseSSEStream(reader) {
            const decoder = new TextDecoder('utf-8');
            let buffer = '';
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop() || '';
                for (const line of lines) {
                    const trimmed = line.trim();
                    if (trimmed.startsWith('data:')) {
                        const dataStr = trimmed.slice(5).trim();
                        if (dataStr === '[DONE]') continue;
                        try { yield JSON.parse(dataStr); } catch(e) {}
                    }
                }
            }
        }

        function renderMarkdown(content) {
            if (!content) return '';
            try {
                let html = marked.parse(content, { breaks: true, gfm: true });
                let clean = DOMPurify.sanitize(html);
                const div = document.createElement('div');
                div.innerHTML = clean;
                div.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
                return div.innerHTML;
            } catch(e) { return content; }
        }

        function getStoragePrefix() {
            const deviceId = getOrCreateDeviceId();
            return `dify_${deviceId}_`;
        }

        createApp({
            setup() {
                const messages = ref([]);
                const inputMessage = ref('');
                const isStreaming = ref(false);
                const errorMsg = ref('');
                const showConfig = ref(false);
                const conversationId = ref('');
                const userId = ref('');
                let abortController = null;
                const messageContainer = ref(null);

                const userConfig = ref({ apiBase: DEFAULT_API_BASE, apiKey: DEFAULT_API_KEY });
                const isApiReady = ref(true);

                let currentUtterance = null;
                const stopSpeaking = () => {
                    if (window.speechSynthesis) {
                        window.speechSynthesis.cancel();
                    }
                    currentUtterance = null;
                };

                const initDevice = () => {
                    const prefix = getStoragePrefix();
                    const savedBase = localStorage.getItem(prefix + 'apiBase');
                    const savedKey = localStorage.getItem(prefix + 'apiKey');
                    userConfig.value.apiBase = savedBase || DEFAULT_API_BASE;
                    userConfig.value.apiKey = savedKey || DEFAULT_API_KEY;
                    isApiReady.value = !!(userConfig.value.apiBase && userConfig.value.apiKey);

                    const storedMessages = localStorage.getItem(prefix + 'messages');
                    if (storedMessages) {
                        try {
                            messages.value = JSON.parse(storedMessages).map(m => ({ ...m, id: m.id || Date.now()+Math.random() }));
                        } catch(e) { messages.value = []; }
                    } else {
                        messages.value = [];
                    }

                    const storedConvId = localStorage.getItem(prefix + 'conversationId');
                    conversationId.value = storedConvId || '';

                    const storedUserId = localStorage.getItem(prefix + 'userId');
                    if (storedUserId) {
                        userId.value = storedUserId;
                    } else {
                        const deviceId = getOrCreateDeviceId();
                        userId.value = `user_${deviceId}`;
                        localStorage.setItem(prefix + 'userId', userId.value);
                    }
                };

                const saveUserConfig = () => {
                    const prefix = getStoragePrefix();
                    localStorage.setItem(prefix + 'apiBase', userConfig.value.apiBase);
                    localStorage.setItem(prefix + 'apiKey', userConfig.value.apiKey);
                    isApiReady.value = !!(userConfig.value.apiBase && userConfig.value.apiKey);
                    showConfig.value = false;
                    errorMsg.value = '';
                };

                const saveMessagesToLocal = () => {
                    const prefix = getStoragePrefix();
                    const toStore = messages.value.map(m => ({ role: m.role, content: m.content, id: m.id }));
                    localStorage.setItem(prefix + 'messages', JSON.stringify(toStore.slice(-100)));
                    if (conversationId.value) {
                        localStorage.setItem(prefix + 'conversationId', conversationId.value);
                    }
                };

                const scrollToBottom = () => {
                    nextTick(() => {
                        if (messageContainer.value) {
                            messageContainer.value.scrollTop = messageContainer.value.scrollHeight;
                        }
                    });
                };

                const sendMessage = async () => {
                    const userMsg = inputMessage.value.trim();
                    if (!userMsg) return;
                    if (!isApiReady.value || !userConfig.value.apiKey) {
                        errorMsg.value = '请先配置 API Key';
                        showConfig.value = true;
                        return;
                    }
                    if (isStreaming.value) return;
                    errorMsg.value = '';

                    messages.value.push({ id: Date.now()+'-user', role: 'user', content: userMsg });
                    inputMessage.value = '';
                    scrollToBottom();

                    const assistantId = Date.now()+'-assistant';
                    messages.value.push({ id: assistantId, role: 'assistant', content: '' });
                    scrollToBottom();

                    const apiBase = userConfig.value.apiBase.replace(/\/$/, '');
                    const url = `${apiBase}/chat-messages`;
                    const body = {
                        inputs: {},
                        query: userMsg,
                        response_mode: 'streaming',
                        conversation_id: conversationId.value || undefined,
                        user: userId.value
                    };

                    isStreaming.value = true;
                    abortController = new AbortController();
                    let fullAnswer = '';
                    let newConversationId = null;

                    try {
                        const res = await fetch(url, {
                            method: 'POST',
                            headers: {
                                'Authorization': `Bearer ${userConfig.value.apiKey}`,
                                'Content-Type': 'application/json',
                                'Accept': 'text/event-stream'
                            },
                            body: JSON.stringify(body),
                            signal: abortController.signal
                        });
                        if (!res.ok) throw new Error(`API错误 ${res.status}`);
                        const reader = res.body.getReader();
                        for await (const event of parseSSEStream(reader)) {
                            if (event.event === 'message') {
                                if (event.answer) {
                                    fullAnswer += event.answer;
                                    const last = messages.value[messages.value.length-1];
                                    if (last && last.role === 'assistant') last.content = fullAnswer;
                                    scrollToBottom();
                                }
                            } else if (event.event === 'message_end') {
                                newConversationId = event.conversation_id;
                                if (newConversationId) {
                                    conversationId.value = newConversationId;
                                    saveMessagesToLocal();
                                }
                                break;
                            } else if (event.event === 'error') {
                                throw new Error(event.message);
                            }
                        }
                        const lastMsg = messages.value[messages.value.length-1];
                        if (lastMsg && lastMsg.content === '') lastMsg.content = '(空响应)';
                    } catch (err) {
                        if (err.name !== 'AbortError') {
                            errorMsg.value = err.message || '请求失败';
                            const last = messages.value[messages.value.length-1];
                            if (last && last.role === 'assistant') last.content = `❌ 错误: ${errorMsg.value}`;
                        }
                    } finally {
                        isStreaming.value = false;
                        abortController = null;
                        saveMessagesToLocal();
                        scrollToBottom();
                    }
                };

                const stopStreaming = () => {
                    if (abortController) abortController.abort();
                    isStreaming.value = false;
                    if (messages.value.length && messages.value[messages.value.length-1].role==='assistant' && !messages.value[messages.value.length-1].content) {
                        messages.value.pop();
                    }
                };

                const newConversation = () => {
                    if (isStreaming.value) stopStreaming();
                    messages.value = [];
                    conversationId.value = '';
                    errorMsg.value = '';
                    const prefix = getStoragePrefix();
                    localStorage.removeItem(prefix + 'messages');
                    localStorage.removeItem(prefix + 'conversationId');
                    scrollToBottom();
                };

                const speakMessage = (msg) => {
                    if (!msg.content) return;
                    if (window.speechSynthesis && window.speechSynthesis.speaking) {
                        window.speechSynthesis.cancel();
                    }
                    const text = msg.role === 'assistant' ? markdownToPlainText(msg.content) : msg.content;
                    if (!text.trim()) return;
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'zh-CN';
                    utterance.onend = () => { currentUtterance = null; };
                    utterance.onerror = () => { currentUtterance = null; };
                    currentUtterance = utterance;
                    window.speechSynthesis.speak(utterance);
                };

                const shouldDisableVoice = (msg, idx) => {
                    if (!msg.content) return true;
                    if (isStreaming.value && msg.role==='assistant' && idx===messages.value.length-1) return true;
                    return false;
                };

                const goBackToHome = () => {
                    if (isStreaming.value) {
                        if (abortController) abortController.abort();
                        isStreaming.value = false;
                    }
                    window.location.href = 'https://drinkwater10086.github.io/A/index.html';
                };

                watch([messages, conversationId], () => {
                    if (!isStreaming.value) saveMessagesToLocal();
                }, { deep: true });

                onMounted(() => {
                    initDevice();
                });

                return {
                    messages,
                    inputMessage,
                    isStreaming,
                    errorMsg,
                    showConfig,
                    userConfig,
                    isApiReady,
                    messageContainer,
                    conversationId,
                    sendMessage,
                    stopStreaming,
                    newConversation,
                    saveUserConfig,
                    renderMarkdown,
                    speakMessage,
                    shouldDisableVoice,
                    stopSpeaking,
                    goBackToHome
                };
            }
        }).mount('#app');

        if (typeof marked !== 'undefined') {
            marked.setOptions({
                breaks: true, gfm: true,
                highlight: (code, lang) => {
                    if (lang && hljs.getLanguage(lang)) return hljs.highlight(code, { language: lang }).value;
                    return hljs.highlightAuto(code).value;
                }
            });
        }
    </script>
</body>
</html>

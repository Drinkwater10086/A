<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <title>敦煌医学·四维灵境 | 首页</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #7a2e1a 0%, #a13e20 100%);
            font-family: 'Segoe UI', '华文楷书', 'Microsoft YaHei', 'Georgia', serif;
            min-height: 100vh;
            padding: 40px 24px;
            color: #fff3e0;
            position: relative;
        }
        /* 敦煌纹样装饰背景 */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(circle at 10% 20%, rgba(255,215,150,0.08) 2%, transparent 2.5%),
                              radial-gradient(circle at 85% 70%, rgba(255,200,100,0.1) 1.8%, transparent 2%);
            background-size: 48px 48px, 64px 64px;
            pointer-events: none;
            z-index: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .hero {
            text-align: center;
            margin-bottom: 52px;
            background: rgba(100, 30, 10, 0.4);
            backdrop-filter: blur(3px);
            border-radius: 80px;
            padding: 24px 20px;
            border: 1px solid #e6b873;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        .hero h1 {
            font-size: 2.6rem;
            background: linear-gradient(135deg, #ffdd99, #ffbb66, #f7934b);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 2px;
            display: inline-flex;
            align-items: center;
            gap: 15px;
        }
        .hero h1 i {
            background: none;
            color: #ffc285;
            font-size: 2.5rem;
        }
        .hero p {
            font-size: 1.2rem;
            color: #ffe0b5;
            margin-top: 12px;
            border-bottom: 1px solid #e6b873;
            display: inline-block;
            padding-bottom: 6px;
            font-style: italic;
        }

        .grid-2x2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 32px;
            margin-bottom: 48px;
        }

        .card {
            background: rgba(50, 20, 8, 0.75);
            backdrop-filter: blur(6px);
            border-radius: 48px;
            padding: 32px 24px 36px;
            text-align: center;
            box-shadow: 0 20px 30px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
            border: 1px solid #e6aa6d;
            cursor: pointer;
        }
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 30px 40px rgba(0,0,0,0.5);
            border-color: #ffcc88;
            background: rgba(70, 30, 12, 0.85);
        }

        .card-icon {
            font-size: 3.4rem;
            color: #ffbc6e;
            margin-bottom: 18px;
        }
        .card h2 {
            font-size: 1.9rem;
            margin-bottom: 12px;
            color: #ffdfb3;
        }
        .card p {
            color: #fae4bc;
            margin-bottom: 28px;
            line-height: 1.45;
        }
        .btn-card {
            background: #c96f2c;
            color: #fff1e0;
            border: none;
            padding: 10px 28px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .btn-card:hover {
            background: #e6832c;
            transform: scale(1.02);
        }

        .taobao-card {
            background: linear-gradient(135deg, rgba(120, 45, 15, 0.85), rgba(170, 70, 25, 0.85));
            border: 1px solid #ffbc6e;
            cursor: default;
        }
        .btn-taobao {
            background: #f0922e;
            color: #2c1a0c;
        }
        .btn-taobao:hover {
            background: #ffa843;
        }
        /* 网址输入框 */
        .url-input {
            width: 85%;
            padding: 8px 12px;
            margin: 12px auto 10px;
            border-radius: 60px;
            border: none;
            background: #fff6e8;
            text-align: center;
            font-size: 0.8rem;
            color: #5a2e1a;
            display: block;
        }
        .footer-note {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #dd9f62;
            color: #ffdfb0;
            font-size: 0.85rem;
        }
        @media (max-width: 680px) {
            body { padding: 24px 16px; }
            .hero h1 { font-size: 1.9rem; }
            .grid-2x2 { grid-template-columns: 1fr; gap: 24px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1><i class="fas fa-dharmachakra"></i> 敦煌医学·四维灵境 <i class="fas fa-feather-alt"></i></h1>
        <p>灵韵天香 · 壁画药方 · 体质慧测 · 智慧对话</p>
    </div>

    <div class="grid-2x2">
        <!-- 智能体：跳转至您指定的 agent.html 网页（新标签页） -->
        <div class="card" onclick="window.open('https://drinkwater10086.github.io/A/agent.html', '_blank')">
            <div class="card-icon"><i class="fas fa-robot"></i></div>
            <h2>🪷 药师佛·智慧体</h2>
            <p>敦煌医学AI使者，解答养生疑惑，解读壁画古方，随问随答。</p>
            <span class="btn-card">进入灵境 <i class="fas fa-arrow-right"></i></span>
        </div>

        <!-- 淘宝店铺跳转（可修改下方输入框内的网址） -->
        <div class="card taobao-card">
            <div class="card-icon"><i class="fab fa-taobao"></i></div>
            <h2>🏺 妙香宝坊·同仁堂</h2>
            <p>百年本草 · 丝路正源。可粘贴任意淘宝/天猫店铺链接。</p>
            <input type="text" id="shopUrl" class="url-input" value="https://tongrentanghealth.tmall.com" placeholder="粘贴淘宝店铺链接">
            <button class="btn-card btn-taobao" onclick="window.open(document.getElementById('shopUrl').value, '_blank')" style="margin-top: 8px;">
                <i class="fas fa-external-link-alt"></i> 前往宝坊
            </button>
        </div>

        <!-- 体质自测小工具（独立页面） -->
        <div class="card" onclick="location.href='constitution.html'">
            <div class="card-icon"><i class="fas fa-clipboard-list"></i></div>
            <h2>🌿 九色鹿·体质镜</h2>
            <p>源自敦煌医籍体质法，五问识偏颇，获壁画灵草调理笺。</p>
            <span class="btn-card">照见体质 <i class="fas fa-heartbeat"></i></span>
        </div>

        <!-- 知识科普专栏（独立页面） -->
        <div class="card" onclick="location.href='knowledge.html'">
            <div class="card-icon"><i class="fas fa-scroll"></i></div>
            <h2>📜 藏经洞·医典卷</h2>
            <p>敦煌遗书医药卷、壁画养生、四季调摄，沉浸式佛国医智。</p>
            <span class="btn-card">阅卷悟道 <i class="fas fa-leaf"></i></span>
        </div>
    </div>

    <div class="footer-note">
        <i class="fas fa-pagoda"></i> 敦煌医学 · 慈悲润生 | 智能体已连接灵境 | 自测与科普源自敦煌古方智慧
    </div>
</div>
</body>
</html>

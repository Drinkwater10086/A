<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>专业康养顾问 - 多用户智能对话</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 10px; }
        .typing-indicator span {
            display: inline-block; width: 6px; height: 6px; border-radius: 50%;
            background-color: #9ca3af; margin: 0 2px;
            animation: typing 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }
        .voice-btn:hover { background-color: #e5e7eb; transform: scale(1.05); }
        .fade-enter-active, .fade-leave-active { transition: opacity 0.2s; }
        .fade-enter-from, .fade-leave-to { opacity: 0; }
    </style>
</head>
<body class="bg-gray-100 font-sans h-screen overflow-hidden">
    <div id="app">
        <!-- 登录/注册界面 -->
        <div v-if="!currentUser" class="h-screen flex items-center justify-center bg-gradient-to-br from-indigo-50 to-purple-50">
            <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8 mx-4">
                <div class="text-center mb-6">
                    <div class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto shadow-lg">
                        <i class="fas fa-robot text-white text-2xl"></i>
                    </div>
                    <h2 class="text-2xl font-bold mt-4 text-gray-800">专业康养顾问</h2>
                    <p class="text-gray-500 mt-1">多用户智能对话系统</p>
                </div>
                <div class="space-y-4">
                    <div v-if="isLoginMode">
                        <input type="text" v-model="loginUsername" placeholder="用户名" class="w-full border rounded-xl px-4 py-2 focus:ring-indigo-500">
                        <input type="password" v-model="loginPassword" placeholder="密码" class="w-full border rounded-xl px-4 py-2 mt-3 focus:ring-indigo-500">
                        <button @click="doLogin" class="w-full bg-indigo-600 text-white py-2 rounded-xl mt-4 hover:bg-indigo-700">登录</button>
                        <p class="text-center text-sm mt-3">没有账号？<a href="#" @click="isLoginMode=false" class="text-indigo-600">立即注册</a></p>
                    </div>
                    <div v-else>
                        <input type="text" v-model="regUsername" placeholder="用户名" class="w-full border rounded-xl px-4 py-2 focus:ring-indigo-500">
                        <input type="password" v-model="regPassword" placeholder="密码" class="w-full border rounded-xl px-4 py-2 mt-3 focus:ring-indigo-500">
                        <button @click="doRegister" class="w-full bg-indigo-600 text-white py-2 rounded-xl mt-4 hover:bg-indigo-700">注册</button>
                        <p class="text-center text-sm mt-3">已有账号？<a href="#" @click="isLoginMode=true" class="text-indigo-600">去登录</a></p>
                    </div>
                    <div v-if="authError" class="text-red-600 text-sm text-center mt-2">{{ authError }}</div>
                </div>
            </div>
        </div>

        <!-- 主聊天界面 (已登录) -->
        <div v-else class="h-full flex flex-col">
            <header class="bg-white/80 backdrop-blur-sm border-b shadow-sm sticky top-0 z-10">
                <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
                    <div class="flex items-center space-x-3">
                        <div class="w-8 h-8 bg-indigo-600 rounded-xl flex items-center justify-center shadow-md">
                            <i class="fas fa-robot text-white text-sm"></i>
                        </div>
                        <h1 class="text-xl font-semibold bg-gradient-to-r from-indigo-700 to-purple-700 bg-clip-text text-transparent">专业康养顾问</h1>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-sm text-gray-600 hidden sm:inline"><i class="fas fa-user-circle"></i> {{ currentUser.username }}</span>
                        <button @click="showConfig = !showConfig" class="p-2 rounded-full hover:bg-gray-100" title="API配置">
                            <i class="fas fa-sliders-h text-gray-600"></i>
                        </button>
                        <button @click="logout" class="p-2 rounded-full hover:bg-gray-100" title="退出登录">
                            <i class="fas fa-sign-out-alt text-gray-600"></i>
                        </button>
                    </div>
                </div>
            </header>

            <!-- 配置侧边栏 -->
            <div v-if="showConfig" class="fixed inset-0 bg-black/30 z-20 flex justify-end" @click.self="showConfig=false">
                <div class="w-full max-w-md bg-white h-full shadow-2xl p-6 overflow-y-auto">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold">⚙️ API 配置</h2>
                        <button @click="showConfig=false" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
                    </div>
                    <div class="space-y-5">
                        <div>
                            <label class="block text-sm font-medium">API 基础地址</label>
                            <input type="text" v-model="userConfig.apiBase" placeholder="https://api.dify.ai/v1" class="w-full border rounded-lg px-4 py-2">
                        </div>
                        <div>
                            <label class="block text-sm font-medium">API Key</label>
                            <input type="password" v-model="userConfig.apiKey" placeholder="app-xxx" class="w-full border rounded-lg px-4 py-2">
                        </div>
                        <button @click="saveUserConfig" class="w-full bg-indigo-600 text-white py-2 rounded-lg">保存配置</button>
                    </div>
                </div>
            </div>

            <!-- 消息区域 -->
            <main class="flex-1 overflow-y-auto" ref="messageContainer">
                <div class="max-w-3xl mx-auto px-4 py-6 space-y-5">
                    <div v-if="messages.length===0" class="flex flex-col items-center justify-center h-64 text-gray-400">
                        <i class="fas fa-comment-dots text-5xl mb-4 opacity-50"></i>
                        <p class="text-lg font-medium">开始与康养顾问对话</p>
                        <p class="text-sm mt-1">默认 API 已配置，可直接使用</p>
                    </div>
                    <div v-for="(msg, idx) in messages" :key="msg.id" class="flex" :class="msg.role==='user'?'justify-end':'justify-start'">
                        <div v-if="msg.role==='assistant'" class="flex items-start gap-2 max-w-[90%]">
                            <div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center"><i class="fas fa-robot text-gray-600"></i></div>
                            <div class="relative px-4 py-3 rounded-2xl bg-white text-gray-800 border border-gray-100 flex-1">
                                <div class="prose prose-sm max-w-none" v-html="renderMarkdown(msg.content)"></div>
                                <div v-if="idx===messages.length-1 && isStreaming && !msg.content" class="typing-indicator flex space-x-1 py-1 mt-1">
                                    <span></span><span></span><span></span>
                                </div>
                            </div>
                            <button @click="speakMessage(msg)" :disabled="shouldDisableVoice(msg,idx)" class="voice-btn w-8 h-8 rounded-full bg-gray-100 text-gray-600 flex items-center justify-center">
                                <i class="fas fa-volume-up"></i>
                            </button>
                        </div>
                        <div v-else class="flex items-start gap-2 max-w-[90%] flex-row-reverse">
                            <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center"><i class="fas fa-user text-indigo-600"></i></div>
                            <div class="relative px-4 py-3 rounded-2xl bg-indigo-600 text-white rounded-tr-none">
                                <div class="whitespace-pre-wrap">{{ msg.content }}</div>
                            </div>
                            <button @click="speakMessage(msg)" class="voice-btn w-8 h-8 rounded-full bg-gray-100 text-gray-600 flex items-center justify-center">
                                <i class="fas fa-volume-up"></i>
                            </button>
                        </div>
                    </div>
                    <div v-if="errorMsg" class="bg-red-50 border border-red-200 text-red-700 px-4 py-2 rounded-xl text-sm">{{ errorMsg }}</div>
                </div>
            </main>

            <!-- 底部输入 -->
            <div class="border-t bg-white/90 p-4 shadow-lg">
                <div class="max-w-3xl mx-auto">
                    <div class="flex items-end gap-3 bg-gray-50 rounded-2xl border p-2 focus-within:ring-2 focus-within:ring-indigo-300">
                        <textarea v-model="inputMessage" @keydown.enter.exact="sendMessage" @keydown.enter.shift.exact="inputMessage+='\n'" rows="1"
                            :disabled="isStreaming || !isApiReady" placeholder="输入消息... (Enter发送)" class="flex-1 bg-transparent border-0 resize-none outline-none py-2 px-3"></textarea>
                        <button v-if="!isStreaming" @click="sendMessage" :disabled="!inputMessage.trim() || !isApiReady"
                            class="p-2 rounded-full" :class="inputMessage.trim()&&isApiReady?'bg-indigo-600 text-white':'bg-gray-200 text-gray-400'">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                        <button v-else @click="stopStreaming" class="p-2 rounded-full bg-red-100 text-red-600"><i class="fas fa-stop"></i></button>
                    </div>
                    <div class="flex justify-between mt-2 text-xs text-gray-400 px-1">
                        <span><i class="fas fa-database"></i> {{ isApiReady ? '✅ API已就绪' : '⚠️ 请配置API Key' }}</span>
                        <span><i class="fas fa-users"></i> 多用户隔离 | 语音播报 | 默认Key已内置</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted, nextTick, watch } = Vue;

        // 默认配置（与最早代码保持一致）
        const DEFAULT_API_BASE = 'https://api.dify.ai/v1';
        const DEFAULT_API_KEY = 'app-66HmEsxZuCXDJGjKPQ6D8zN4';

        function generateUserId(username) {
            return `user-${username}-${Date.now()}-${Math.random().toString(36).substring(2,8)}`;
        }

        function markdownToPlainText(md) {
            if (!md) return '';
            let text = md.replace(/!\[.*?\]\(.*?\)/g, '')
                         .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
                         .replace(/`([^`]+)`/g, '$1')
                         .replace(/```[\s\S]*?```/g, '')
                         .replace(/(\*\*|__)(.*?)\1/g, '$2')
                         .replace(/(\*|_)(.*?)\1/g, '$2')
                         .replace(/^#{1,6}\s+/gm, '')
                         .replace(/^[\s]*[-+*]\s+/gm, '')
                         .replace(/^\d+\.\s+/gm, '')
                         .replace(/<[^>]*>/g, '');
            return text.trim();
        }

        async function* parseSSEStream(reader) {
            const decoder = new TextDecoder('utf-8');
            let buffer = '';
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop() || '';
                for (const line of lines) {
                    const trimmed = line.trim();
                    if (trimmed.startsWith('data:')) {
                        const dataStr = trimmed.slice(5).trim();
                        if (dataStr === '[DONE]') continue;
                        try { yield JSON.parse(dataStr); } catch(e) {}
                    }
                }
            }
        }

        function renderMarkdown(content) {
            if (!content) return '';
            try {
                let html = marked.parse(content, { breaks: true, gfm: true });
                let clean = DOMPurify.sanitize(html);
                const div = document.createElement('div');
                div.innerHTML = clean;
                div.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
                return div.innerHTML;
            } catch(e) { return content; }
        }

        function getUserStoragePrefix(username) {
            return `dify_multi_${username}_`;
        }

        createApp({
            setup() {
                const currentUser = ref(null);
                const isLoginMode = ref(true);
                const loginUsername = ref('');
                const loginPassword = ref('');
                const regUsername = ref('');
                const regPassword = ref('');
                const authError = ref('');

                const messages = ref([]);
                const inputMessage = ref('');
                const isStreaming = ref(false);
                const errorMsg = ref('');
                const showConfig = ref(false);
                const conversationId = ref('');
                const userId = ref('');
                let abortController = null;
                const messageContainer = ref(null);

                // 用户自己的API配置，默认使用内置值
                const userConfig = ref({ apiBase: DEFAULT_API_BASE, apiKey: DEFAULT_API_KEY });
                const isApiReady = ref(true); // 因为默认有key，所以初始为true

                let currentUtterance = null;

                // 用户管理
                const loadUsers = () => {
                    const users = localStorage.getItem('dify_multi_users');
                    return users ? JSON.parse(users) : {};
                };
                const saveUsers = (users) => localStorage.setItem('dify_multi_users', JSON.stringify(users));

                const doRegister = () => {
                    const username = regUsername.value.trim();
                    const password = regPassword.value.trim();
                    if (!username || !password) { authError.value = '用户名/密码不能为空'; return; }
                    const users = loadUsers();
                    if (users[username]) { authError.value = '用户名已存在'; return; }
                    users[username] = { password, createdAt: Date.now() };
                    saveUsers(users);
                    currentUser.value = { username };
                    initUserData(username);
                    authError.value = '';
                };

                const doLogin = () => {
                    const username = loginUsername.value.trim();
                    const password = loginPassword.value.trim();
                    if (!username || !password) { authError.value = '请输入用户名和密码'; return; }
                    const users = loadUsers();
                    if (!users[username] || users[username].password !== password) {
                        authError.value = '用户名或密码错误'; return;
                    }
                    currentUser.value = { username };
                    initUserData(username);
                    authError.value = '';
                };

                const logout = () => {
                    if (isStreaming.value) stopStreaming();
                    currentUser.value = null;
                    messages.value = [];
                    conversationId.value = '';
                    userId.value = '';
                };

                const initUserData = (username) => {
                    const prefix = getUserStoragePrefix(username);
                    // 读取API配置，如果没有保存过，则使用默认值（内置key）
                    const savedBase = localStorage.getItem(prefix + 'apiBase');
                    const savedKey = localStorage.getItem(prefix + 'apiKey');
                    userConfig.value.apiBase = savedBase || DEFAULT_API_BASE;
                    userConfig.value.apiKey = savedKey || DEFAULT_API_KEY;
                    isApiReady.value = !!(userConfig.value.apiBase && userConfig.value.apiKey);

                    const storedMessages = localStorage.getItem(prefix + 'messages');
                    if (storedMessages) {
                        try {
                            messages.value = JSON.parse(storedMessages).map(m => ({ ...m, id: m.id || Date.now()+Math.random() }));
                        } catch(e) { messages.value = []; }
                    } else { messages.value = []; }

                    const storedConvId = localStorage.getItem(prefix + 'conversationId');
                    conversationId.value = storedConvId || '';

                    let storedUserId = localStorage.getItem(prefix + 'userId');
                    if (storedUserId) {
                        userId.value = storedUserId;
                    } else {
                        userId.value = generateUserId(username);
                        localStorage.setItem(prefix + 'userId', userId.value);
                    }
                };

                const saveUserConfig = () => {
                    const prefix = getUserStoragePrefix(currentUser.value.username);
                    localStorage.setItem(prefix + 'apiBase', userConfig.value.apiBase);
                    localStorage.setItem(prefix + 'apiKey', userConfig.value.apiKey);
                    isApiReady.value = !!(userConfig.value.apiBase && userConfig.value.apiKey);
                    showConfig.value = false;
                    errorMsg.value = '';
                };

                const saveMessagesToLocal = () => {
                    if (!currentUser.value) return;
                    const prefix = getUserStoragePrefix(currentUser.value.username);
                    const toStore = messages.value.map(m => ({ role: m.role, content: m.content, id: m.id }));
                    localStorage.setItem(prefix + 'messages', JSON.stringify(toStore.slice(-100)));
                    if (conversationId.value) {
                        localStorage.setItem(prefix + 'conversationId', conversationId.value);
                    }
                };

                const scrollToBottom = () => {
                    nextTick(() => { if(messageContainer.value) messageContainer.value.scrollTop = messageContainer.value.scrollHeight; });
                };

                const sendMessage = async () => {
                    const userMsg = inputMessage.value.trim();
                    if (!userMsg) return;
                    if (!isApiReady.value || !userConfig.value.apiKey) {
                        errorMsg.value = '请先配置 API Key';
                        showConfig.value = true;
                        return;
                    }
                    if (isStreaming.value) return;
                    errorMsg.value = '';

                    messages.value.push({ id: Date.now()+'-user', role: 'user', content: userMsg });
                    inputMessage.value = '';
                    scrollToBottom();

                    const assistantId = Date.now()+'-assistant';
                    messages.value.push({ id: assistantId, role: 'assistant', content: '' });
                    scrollToBottom();

                    const apiBase = userConfig.value.apiBase.replace(/\/$/, '');
                    const url = `${apiBase}/chat-messages`;
                    const body = {
                        inputs: {},
                        query: userMsg,
                        response_mode: 'streaming',
                        conversation_id: conversationId.value || undefined,
                        user: userId.value
                    };

                    isStreaming.value = true;
                    abortController = new AbortController();
                    let fullAnswer = '';
                    let newConversationId = null;

                    try {
                        const res = await fetch(url, {
                            method: 'POST',
                            headers: {
                                'Authorization': `Bearer ${userConfig.value.apiKey}`,
                                'Content-Type': 'application/json',
                                'Accept': 'text/event-stream'
                            },
                            body: JSON.stringify(body),
                            signal: abortController.signal
                        });
                        if (!res.ok) throw new Error(`API错误 ${res.status}`);

                        const reader = res.body.getReader();
                        for await (const event of parseSSEStream(reader)) {
                            if (event.event === 'message') {
                                if (event.answer) {
                                    fullAnswer += event.answer;
                                    const last = messages.value[messages.value.length-1];
                                    if (last && last.role === 'assistant') last.content = fullAnswer;
                                    scrollToBottom();
                                }
                            } else if (event.event === 'message_end') {
                                newConversationId = event.conversation_id;
                                if (newConversationId) {
                                    conversationId.value = newConversationId;
                                    saveMessagesToLocal();
                                }
                                break;
                            } else if (event.event === 'error') {
                                throw new Error(event.message);
                            }
                        }
                        const lastMsg = messages.value[messages.value.length-1];
                        if (lastMsg && lastMsg.content === '') lastMsg.content = '(空响应)';
                    } catch (err) {
                        if (err.name !== 'AbortError') {
                            errorMsg.value = err.message || '请求失败';
                            const last = messages.value[messages.value.length-1];
                            if (last && last.role === 'assistant') last.content = `❌ 错误: ${errorMsg.value}`;
                        }
                    } finally {
                        isStreaming.value = false;
                        abortController = null;
                        saveMessagesToLocal();
                        scrollToBottom();
                    }
                };

                const stopStreaming = () => {
                    if (abortController) abortController.abort();
                    isStreaming.value = false;
                    if (messages.value.length && messages.value[messages.value.length-1].role==='assistant' && !messages.value[messages.value.length-1].content) {
                        messages.value.pop();
                    }
                };

                const speakMessage = (msg) => {
                    if (!msg.content) return;
                    if (window.speechSynthesis) window.speechSynthesis.cancel();
                    const text = msg.role === 'assistant' ? markdownToPlainText(msg.content) : msg.content;
                    if (!text.trim()) return;
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'zh-CN';
                    window.speechSynthesis.speak(utterance);
                };
                const shouldDisableVoice = (msg, idx) => {
                    if (!msg.content) return true;
                    if (isStreaming.value && msg.role==='assistant' && idx===messages.value.length-1) return true;
                    return false;
                };

                watch([messages, conversationId], () => {
                    if (currentUser.value && !isStreaming.value) saveMessagesToLocal();
                }, { deep: true });

                return {
                    currentUser, isLoginMode, loginUsername, loginPassword, regUsername, regPassword, authError,
                    doRegister, doLogin, logout,
                    messages, inputMessage, isStreaming, errorMsg, showConfig, userConfig, isApiReady,
                    messageContainer, conversationId,
                    sendMessage, stopStreaming, saveUserConfig, renderMarkdown, speakMessage, shouldDisableVoice
                };
            }
        }).mount('#app');

        if (typeof marked !== 'undefined') {
            marked.setOptions({
                breaks: true, gfm: true,
                highlight: (code, lang) => {
                    if (lang && hljs.getLanguage(lang)) return hljs.highlight(code, { language: lang }).value;
                    return hljs.highlightAuto(code).value;
                }
            });
        }
    </script>
</body>
</html>
